name: integration test

permissions:
  pull-requests: read
  contents: read

on:
  push:
    branches:
      - master

  pull_request:

jobs:
  test:
    name: integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Run integration tests
        working-directory: internal/testintegration
        run: >
          go test
          -v
          -tags testintegration
          -count 1
          -timeout 30m
          -coverprofile='integration.coverage.${{ matrix.os }}.out'
          -covermode=atomic
          -coverpkg=github.com/go-openapi/analysis/...
          ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: 'internal/testintegration/*.coverage.*.out'
          name: 'integration.coverage.${{ matrix.os }}'
          retention-days: 1

  # Single gate job for branch protection rules
  integration-test:
    name: integration test
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Matrix jobs failed or were cancelled"
            exit 1
          fi

  collect-coverage:
    needs: [integration-test]
    if: ${{ !cancelled() && needs.integration-test.result == 'success' }}
    uses: go-openapi/ci-workflows/.github/workflows/collect-coverage.yml@20153976c20b55ce3289b6f9cf36c7149d3f1fff # v0.4.2
    secrets: inherit
